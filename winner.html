<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Ganador del Sorteo!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
      text-align: center;
      padding: 1.5rem 1rem;
      overflow-x: hidden;
    }

    /* Fondo animado */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(124,58,237,0.2) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 70%, rgba(255,215,0,0.12) 0%, transparent 50%);
      animation: bgPulse 3s ease infinite alternate;
      z-index: 0;
    }
    @keyframes bgPulse {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) ease infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(0.8); }
      to   { opacity: 0.8; transform: scale(1.2); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, #1a1a35, #22224a);
      border: 1px solid rgba(255,215,0,0.35);
      border-radius: 24px;
      padding: 2rem 1.5rem;
      max-width: 420px;
      width: 100%;
      box-shadow:
        0 0 60px rgba(255,215,0,0.2),
        0 20px 60px rgba(0,0,0,0.6);
      animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes cardIn {
      from { transform: scale(0.6) translateY(40px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .trophy {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 0.3rem;
      animation: trophyBounce 0.9s ease infinite alternate;
    }
    @keyframes trophyBounce {
      from { transform: translateY(0) rotate(-4deg); }
      to   { transform: translateY(-10px) rotate(4deg); }
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: #FFD700;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 10px #FFD700;
    }

    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      margin-bottom: 1rem;
    }

    .winner-name {
      font-size: clamp(1.2rem, 5vw, 1.7rem);
      font-weight: 900;
      background: linear-gradient(135deg, #FFD700, #FFA500, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.3;
      padding: 0.6rem 0 1rem;
      filter: drop-shadow(0 0 10px rgba(255,215,0,0.4));
    }

    .divider {
      width: 70%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.4), transparent);
      margin: 0.5rem auto 1rem;
    }

    /* Premio */
    .prize-section {
      background: rgba(255,215,0,0.06);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .prize-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: #FFD700;
      text-transform: uppercase;
      margin-bottom: 0.7rem;
    }

    .prize-img {
      width: 100%;
      max-width: 300px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      display: block;
      margin: 0 auto;
      object-fit: cover;
      max-height: 220px;
    }

    .prize-name {
      font-size: 1rem;
      font-weight: 700;
      color: white;
      margin-top: 0.7rem;
    }

    .congrats {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.5rem;
    }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 1.5rem;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="card">
    <span class="trophy">🏆</span>
    <p class="label">¡Felicitaciones!</p>
    <p class="subtitle">Eres el ganador del sorteo</p>

    <p class="winner-name" id="winnerDisplay"></p>

    <div class="divider"></div>

    <!-- Premio -->
    <div class="prize-section">
      <p class="prize-label">🎁 Tu premio</p>
      <img
        class="prize-img"
        src="premio.jpg"
        alt="Premio: Completo más bebida"
        onerror="this.style.display='none'; document.getElementById('imgError').style.display='block';"
      />
      <div id="imgError" style="display:none; padding:1rem; color:rgba(255,255,255,0.4); font-size:0.8rem;">
        🍔 Completo + Bebida
      </div>
      <p class="prize-name">🌭 Completo + Bebida</p>
    </div>

    <p class="congrats">🎉 ¡Tu suerte estuvo de tu lado hoy! 🎉</p>
  </div>

  <p class="footer">SORTEO · RULETA INTERACTIVA</p>

  <script>
    // Mostrar nombre del ganador desde URL
    const params = new URLSearchParams(window.location.search);
    const name   = params.get('name');
    const el     = document.getElementById('winnerDisplay');

    if (name && name.trim()) {
      el.textContent = name.trim();
    } else {
      el.style.color = 'rgba(255,255,255,0.4)';
      el.style.fontSize = '0.9rem';
      el.textContent = 'No se encontró el nombre del ganador';
    }

    // Estrellas decorativas
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 40; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = 1 + Math.random() * 2;
      star.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%; left:${Math.random()*100}%;
        --dur:${1.5+Math.random()*2.5}s;
        animation-delay:${Math.random()*2}s;
      `;
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
